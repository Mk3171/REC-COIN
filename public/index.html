<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>REC Mining</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
  <div class="record-counter" style="color:white; border-color:#555;">⚡ <span id="recAmount">0.000000</span> REC</div>
  <div class="record-counter">🔴 <span id="recordCount">0</span> RECORD</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="home-inner">
    <button class="camera-btn" onclick="tap()">
      <img src="logo.jpeg" alt="REC" onerror="this.parentElement.innerHTML='📷'">
    </button>
    <div style="font-size:11px; color:#666; margin-top:4px;">اضغط للتعدين</div>
    <div class="energy-wrap">
      <div class="energy-header">
        <span>⚡ الطاقة</span>
        <span id="energyText">1000 / 1000</span>
      </div>
      <div class="energy-bar-bg">
        <div class="energy-bar-fill" id="energyBar" style="width:100%"></div>
      </div>
    </div>
    <div style="font-size:11px; color:#666; margin-top:5px;">سرعة التعدين: <span id="miningSpeedShow">0.000001</span> REC/ث</div>
    <button class="upgrade-btn" onclick="openUpgrade()">UPGRADE</button>
  </div>
</div>

<!-- UPGRADE -->
<div class="overlay-page" id="upgradePage">
  <button class="back-btn" onclick="document.getElementById('upgradePage').classList.remove('open')">← رجوع</button>
  <h2 style="margin-bottom:20px; color:#FF0000;">الترقيات</h2>
  <div class="upg-card">
    <div style="font-size:16px;">⚡ ترقية الكبسات</div>
    <div style="color:#FF0000; font-size:13px; margin:5px 0;">المستوى: <span id="tapLevel">0</span> / 100</div>
    <div style="color:#aaa; font-size:12px;">التكلفة: <span id="tapCost">50</span> RECORD</div>
    <div style="color:#aaa; font-size:12px; margin-top:4px;">كبسات لكل ضغطة: <span id="tapPower">1</span></div>
    <button class="do-btn" id="tapUpgradeBtn" onclick="upgradeTap()">ترقية</button>
  </div>
  <div class="upg-card">
    <div style="font-size:16px;">🔋 ترقية الطاقة</div>
    <div style="color:#FF0000; font-size:13px; margin:5px 0;">المستوى: <span id="energyLevel">0</span> / 100</div>
    <div style="color:#aaa; font-size:12px;">التكلفة: <span id="energyCost">50</span> RECORD</div>
    <div style="color:#aaa; font-size:12px; margin-top:4px;">الطاقة الكلية: <span id="maxEnergyShow">1000</span></div>
    <button class="do-btn" id="energyUpgradeBtn" onclick="upgradeEnergy()">ترقية</button>
  </div>
</div>

<!-- CARDS -->
<div id="cards" class="page">
  <div class="page-title">🃏 البطاقات</div>
  <div style="display:flex; gap:8px; margin-bottom:15px; overflow-x:auto; padding-bottom:5px;">
    <button class="cat-btn active" onclick="showCategory(0,this)">🎌 أنمي</button>
    <button class="cat-btn" onclick="showCategory(1,this)">🚗 سيارات</button>
    <button class="cat-btn" onclick="showCategory(2,this)">🌙 ملاهي</button>
    <button class="cat-btn" onclick="showCategory(3,this)">🏰 قصور</button>
  </div>
  <div class="card-grid" id="cat-0"></div>
  <div class="card-grid" id="cat-1" style="display:none"></div>
  <div class="card-grid" id="cat-2"
